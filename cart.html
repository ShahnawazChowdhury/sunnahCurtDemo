</head>
<body>

<nav class="navbar">

  <ul class="nav-links">

<section class="cart-page">
  <h2>Your Cart</h2>
  <table id="cart-table">
    <tr><th>Product</th><th>Price</th><th>Quantity</th><th>Total</th></tr>
  </table>
  <div class="cart-total">
    <h3 id="cart-total">Total: ৳0</h3>
    <button class="cart-btn" id="checkoutBtn">Proceed to Checkout</button>
    <button class="cart-btn" id="clearBtn">Clear Cart</button>
  </div>
</section>

<script src="carts.js"></script>
